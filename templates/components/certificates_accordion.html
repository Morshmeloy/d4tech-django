{% load static %}
<section class="py-12 bg-background">
    <div class="container mx-auto px-4">
        <h2 class="text-3xl md:text-5xl font-bold text-center mb-12 text-foreground">
            Лицензии и сертификаты
        </h2>

        <div class="certificates-grid">
            <div class="panel">
                <img src="{% static 'images/partners.jpg' %}" alt="Сертификат партнерства">
            </div>
            <div class="panel">
                <img src="{% static 'images/reg.jpg' %}" alt="Регистрационный сертификат">
            </div>
            <div class="panel">
                <img src="{% static 'images/sert.jpg' %}" alt="Сертификат">
            </div>
        </div>
    </div>
</section>

<style>
    .certificates-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 16px;
        transition: grid-template-columns 0.5s ease;
        height: 55vh;
        min-height: 300px;
    }

    .panel {
        border-radius: 0.75rem;
        overflow: hidden;
        position: relative;
        cursor: pointer;
        background: var(--muted);
        transition: transform 0.3s ease;
    }

    .panel img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
        transition: transform 0.5s ease;
    }

    /* Тёмный overlay поверх картинок, которые НЕ наведены */
    .panel::after {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        transition: opacity 0.4s ease;
        pointer-events: none;
        border-radius: 0.75rem;
        opacity: 1;
    }

    /* Убираем затемнение у картинки, на которую навели */
    .panel:hover::after {
        opacity: 0;
    }

    /* При наведении на любую панель — все остальные сужаются, а выбранная расширяется */
    .certificates-grid:has(.panel:nth-child(1):hover) {
        grid-template-columns: 2.5fr 0.6fr 0.6fr;
    }
    .certificates-grid:has(.panel:nth-child(2):hover) {
        grid-template-columns: 0.6fr 2.5fr 0.6fr;
    }
    .certificates-grid:has(.panel:nth-child(3):hover) {
        grid-template-columns: 0.6fr 0.6fr 2.5fr;
    }

    /* Лёгкое увеличение картинки внутри выбранной панели */
    .panel:hover img {
        transform: scale(1.04);
    }

    /* Адаптив */
    @media (max-width: 768px) {
        .certificates-grid {
            height: 40vh;
            min-height: 220px;
            gap: 10px;
        }
        .certificates-grid:has(.panel:nth-child(1):hover) {
            grid-template-columns: 2fr 0.8fr 0.8fr;
        }
        .certificates-grid:has(.panel:nth-child(2):hover) {
            grid-template-columns: 0.8fr 2fr 0.8fr;
        }
        .certificates-grid:has(.panel:nth-child(3):hover) {
            grid-template-columns: 0.8fr 0.8fr 2fr;
        }
    }

    @media (max-width: 480px) {
        .certificates-grid {
            height: 30vh;
            min-height: 160px;
            gap: 6px;
        }
        .certificates-grid:has(.panel:nth-child(1):hover) {
            grid-template-columns: 1.8fr 0.9fr 0.9fr;
        }
        .certificates-grid:has(.panel:nth-child(2):hover) {
            grid-template-columns: 0.9fr 1.8fr 0.9fr;
        }
        .certificates-grid:has(.panel:nth-child(3):hover) {
            grid-template-columns: 0.9fr 0.9fr 1.8fr;
        }
    }
</style>
