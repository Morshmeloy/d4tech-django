{% load static %}
<section class="py-12 bg-background">
    <div class="container mx-auto px-4">
        <h2 class="text-3xl md:text-5xl font-bold text-center mb-12 text-foreground">
            Лицензии и сертификаты
        </h2>

        <div class="grid-container">
            <div class="panel" id="panel1">
                <div class="panel-inner">
                    <img src="{% static 'images/partners.jpg' %}" alt="Сертификат партнерства" class="panel-img">
                    <div class="panel-content">
                        <h3 class="panel-title">Сертификат партнёрства</h3>
                        <p class="panel-desc">Сертификат, подтверждающий партнёрские отношения</p>
                        <a href="#" class="panel-link" target="_blank">Открыть →</a>
                    </div>
                </div>
            </div>
            <div class="panel" id="panel2">
                <div class="panel-inner">
                    <img src="{% static 'images/reg.jpg' %}" alt="Регистрационный сертификат" class="panel-img">
                    <div class="panel-content">
                        <h3 class="panel-title">Регистрационный сертификат</h3>
                        <p class="panel-desc">Свидетельство о государственной регистрации</p>
                        <a href="#" class="panel-link" target="_blank">Открыть →</a>
                    </div>
                </div>
            </div>
            <div class="panel" id="panel3">
                <div class="panel-inner">
                    <img src="{% static 'images/sert.jpg' %}" alt="Сертификат" class="panel-img">
                    <div class="panel-content">
                        <h3 class="panel-title">Сертификат</h3>
                        <p class="panel-desc">Дополнительный сертификат</p>
                        <a href="#" class="panel-link" target="_blank">Открыть →</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
    .grid-container {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
        transition: grid-template-columns 0.4s ease;
    }

    .panel {
        background: rgba(37, 43, 71, 0.4);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        overflow: hidden;
        transition: all 0.4s ease;
        cursor: pointer;
        min-height: 200px;
        display: flex;
        flex-direction: column;
    }

    .panel:hover {
        border-color: var(--primary);
        box-shadow: 0 0 20px rgba(79, 209, 199, 0.15);
    }

    .grid-container:has(.panel:hover) .panel:not(:hover) {
        /* при наведении на любой – остальные сужаются */
    }

    .grid-container:has(.panel:hover) .panel:hover {
        grid-column: span 2;
    }

    .panel-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        flex: 1;
        text-align: center;
        gap: 12px;
    }

    .panel-img {
        max-width: 100%;
        max-height: 120px;
        object-fit: contain;
        border-radius: 6px;
        transition: transform 0.3s ease;
    }

    .panel:hover .panel-img {
        transform: scale(1.02);
    }

    .panel-content {
        display: flex;
        flex-direction: column;
        gap: 6px;
        width: 100%;
    }

    .panel-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--foreground);
        margin: 0;
    }

    .panel-desc {
        font-size: 13px;
        color: var(--muted-foreground);
        margin: 0;
        max-height: 0;
        opacity: 0;
        overflow: hidden;
        transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.3s ease;
    }

    .panel:hover .panel-desc {
        max-height: 100px;
        opacity: 1;
        margin-top: 4px;
    }

    .panel-link {
        font-size: 13px;
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s;
    }

    .panel-link:hover {
        text-decoration: underline;
    }

    @media (max-width: 768px) {
        .grid-container {
            grid-template-columns: 1fr 1fr;
        }
        .grid-container:has(.panel:hover) .panel:hover {
            grid-column: span 1;
        }
        .panel {
            min-height: 150px;
        }
        .panel-img {
            max-height: 80px;
        }
    }

    @media (max-width: 480px) {
        .grid-container {
            grid-template-columns: 1fr;
        }
        .panel {
            min-height: 120px;
        }
    }
</style>
