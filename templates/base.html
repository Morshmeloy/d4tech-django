{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Д4 Технологии — комплексная автоматизация и цифровизация объектов электроэнергетики">
    <title>{% block title %}Д4 Технологии{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#1a1f36',
                        foreground: '#ffffff',
                        card: '#252b47',
                        'card-foreground': '#ffffff',
                        primary: '#4fd1c7',
                        'primary-foreground': '#0f172a',
                        secondary: '#334155',
                        'secondary-foreground': '#ffffff',
                        muted: '#2d3748',
                        'muted-foreground': '#a0aec0',
                        accent: '#38bdf8',
                        'accent-foreground': '#0f172a',
                        border: '#475569',
                        input: '#374151',
                        ring: '#4fd1c7',
                        destructive: '#ef4444',
                    },
                    borderRadius: {
                        DEFAULT: '0.625rem',
                    },
                    borderColor: {
                        DEFAULT: '#475569',
                        border: '#475569',
                    }
                }
            }
        }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet" crossorigin="anonymous" integrity="sha384-/rJKQnzOkEo+daG0jMjU1IwwY9unxt1NBw3Ef2fmOJ3PW/TfAg2KXVoWwMZQZtw9">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" crossorigin="anonymous" integrity="sha384-gAPqlBuTCdtVcYt9ocMOYWrnBZ4XSL6q+4eXqwNycOr4iFczhNKtnYhF3NEXJM51">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}?v=2">
    <link rel="icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">
</head>
<body class="antialiased flex flex-col min-h-screen">
    {% include "components/header.html" %}
    <main class="flex-grow py-6 md:px-8 md:py-0">
        {% block content %}{% endblock %}
    </main>
    {% include "components/footer.html" %}
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js" crossorigin="anonymous" integrity="sha384-n1AULnKdMJlK1oQCLNDL9qZsDgXtH6jRYFCpBtWFc+a9Yve0KSoMn575rk755NJZ"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js" crossorigin="anonymous" integrity="sha384-2UI1PfnXFjVMQ7/ZDEF70CR943oH3v6uZrFQGGqJYlvhh4g6z6uVktxYbOlAczav"></script>
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/scroll-reveal.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
